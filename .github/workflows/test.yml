# Format, clippy, and tests (same as ./scripts/run-tests.sh)
name: PR Tests

permissions:
  contents: read

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: Format, clippy, test
        run: ./scripts/run-tests.sh
