# Format, clippy, and tests (same as ./scripts/run-tests.sh)
name: PR Tests

permissions:
  contents: read

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          repositories: cli-framework
          owner: aroff
      - name: Grant cargo access to cli-framework
        run: git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf "https://github.com/"
      - uses: Swatinem/rust-cache@v2
      - name: Format, clippy, test
        run: ./scripts/run-tests.sh
