[package]
name = "agwiki"
version = "0.1.0"
edition = "2021"
description = "Agent-based wiki: prep, ingest, link checks, skill export"
license = "Apache-2.0"
repository = "https://github.com/goagwiki/agwiki"
keywords = ["wiki", "markdown", "cli", "agent"]
categories = ["command-line-utilities"]

[[bin]]
name = "agwiki"
path = "src/main.rs"

[lib]
name = "agwiki"
path = "src/lib.rs"

[dependencies]
anyhow = "1.0"
clap = { version = "4.5", features = ["derive", "env"] }
regex = "1.10"
pathdiff = "0.2"


[dev-dependencies]
tempfile = "3.10"
