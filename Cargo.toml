[package]
name = "agwiki"
version = "0.1.7"
edition = "2021"
description = "Agent-based wiki: init, ingest, validate, skill export"
license = "Apache-2.0"
repository = "https://github.com/goagwiki/agwiki"
keywords = ["wiki", "markdown", "cli", "agent"]
categories = ["command-line-utilities"]

[[bin]]
name = "agwiki"
path = "src/main.rs"

[lib]
name = "agwiki"
path = "src/lib.rs"

[dependencies]
aikit-sdk = "0.1.50"
anyhow = "1.0"
clap = { version = "4.5", features = ["derive", "env"] }
regex = "1.10"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"


[dev-dependencies]
assert_cmd = "2.0"
predicates = "3.0"
serde_json = "1.0"
tempfile = "3.10"
