[package]
name = "agwiki"
version = "0.2.0"
edition = "2021"
description = "Agent-based wiki: init, ingest, validate, skill export"
license = "Apache-2.0"
repository = "https://github.com/goagwiki/agwiki"
keywords = ["wiki", "markdown", "cli", "agent"]
categories = ["command-line-utilities"]

[[bin]]
name = "agwiki"
path = "src/main.rs"

[lib]
name = "agwiki"
path = "src/lib.rs"

[dependencies]
aikit-sdk = "0.1.50"
anyhow = "1.0"
axum = "0.7"
clap = { version = "4.5", features = ["derive", "env"] }
http = "1.1"
mime = "0.3"
mime_guess = "2.0"
pulldown-cmark = "0.11"
regex = "1.10"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
sha2 = "0.10"
ulid = "1.1"
time = { version = "0.3", features = ["formatting"] }
tokio = { version = "1.37", features = ["macros", "net", "rt", "rt-multi-thread", "signal"] }
toml = "0.8"
tower = "0.5"
tower-http = { version = "0.6", features = ["trace"] }
webbrowser = "1.0"


[dev-dependencies]
assert_cmd = "2.0"
predicates = "3.0"
serde_json = "1.0"
tempfile = "3.10"
tokio = { version = "1.37", features = ["macros", "rt", "rt-multi-thread"] }
